services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: capman_dev
      POSTGRES_USER: capman
      POSTGRES_PASSWORD: capman_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capman"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
